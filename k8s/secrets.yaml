# Substitute with envsubst (same pattern as costy / microservices secrets).
#   export GRAFANA_OBSERVABILITY_USER_TOKEN=glc_...    # Loki + Mimir remote_write (and any shared uses)
#   export GRAFANA_OBSERVABILITY_OTLP_TOKEN=glc_...   # OTLP gateway (OpenTelemetry / traces ingest); often a dedicated token
#   envsubst < k8s/secrets.yaml | kubectl apply -f -
# Or run ./deploy.sh from the repo root (it does this for you).
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-credentials
  namespace: observability
type: Opaque
stringData:
  token: "${GRAFANA_OBSERVABILITY_USER_TOKEN}"
  otlpToken: "${GRAFANA_OBSERVABILITY_OTLP_TOKEN}"
